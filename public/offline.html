<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eqpet - オフライン</title>
  <style>
    body {
      background: #0d0d1a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      text-align: center;
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { color: #64748b; font-size: 14px; line-height: 1.7; }
    button {
      margin-top: 24px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="emoji">🐾</div>
  <h1>接続を確認中...</h1>
  <p>ネットワーク接続を確認してください。<br>AIたちがあなたを待っています。</p>
  <button onclick="location.reload()">再試行</button>
</body>
</html>
