<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>

  <!-- orbit ring (dashed) -->
  <circle cx="96" cy="96" r="58" fill="none" stroke="url(#accent)" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- orbit dots — 3 AI agents -->
  <!-- top (0°) -->
  <circle cx="96" cy="38" r="7" fill="url(#accent)" filter="url(#glow)" opacity="0.9"/>
  <!-- bottom-right (135°) -->
  <circle cx="137" cy="137" r="7" fill="url(#accent)" filter="url(#glow)" opacity="0.9"/>
  <!-- bottom-left (225°) -->
  <circle cx="55" cy="137" r="7" fill="url(#accent)" filter="url(#glow)" opacity="0.9"/>

  <!-- "E" lettermark -->
  <text x="96" y="118" text-anchor="middle" font-family="'Inter','Arial Black',sans-serif" font-weight="800" font-size="80" fill="white" letter-spacing="-2">E</text>
</svg>
